name: validate

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  UV_FROZEN: "true"
  UV_NO_PROGRESS: "true"

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.1"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false
      - run: corepack enable && corepack install --global pnpm@11.9.0
      - run: uv sync --frozen
      - run: pnpm install --frozen-lockfile
      - run: uv run --offline python -m openbrec.verify bundle-structure --receipt evidence/m0/bundle-structure/m0-06-receipt.json
      - run: uv run --offline python -m openbrec.verify schema --receipt evidence/m0/schema/m0-06-receipt.json
      - run: uv run --offline python -m openbrec.verify fixtures --receipt evidence/m0/fixtures/m0-06-receipt.json
      - run: uv run --offline python -m openbrec.verify addon-contracts --receipt evidence/p0/p0-01/addon-contracts/p0-01-receipt.json
      - run: uv run --offline python -m openbrec.verify addon-fixtures --receipt evidence/p0/p0-01/addon-fixtures/p0-01-receipt.json
      - run: uv run --offline python -m openbrec.verify schema-compat --receipt evidence/m0/schema-compat/m0-06-receipt.json
      - run: uv run --offline python -m openbrec.verify contracts-gen --check --receipt evidence/m0/contracts-gen/m0-06-receipt.json
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: m0-contract-receipts
          path: evidence/m0
          if-no-files-found: error
  runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.1"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false
      - run: corepack enable && corepack install --global pnpm@11.9.0
      - run: uv sync --frozen
      - run: uv run --offline python -m openbrec.verify compose-build --receipt evidence/m0/compose-build/m0-06-receipt.json
      - run: uv run --offline python -m openbrec.verify offline-startup --receipt evidence/m0/offline-startup/m0-06-receipt.json
      - run: uv run --offline python -m openbrec.verify postgres-disposition --receipt evidence/m0/postgres-disposition/m0-06-receipt.json
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: m0-runtime-receipts
          path: evidence/m0
          if-no-files-found: error

  replay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.1"
      - run: uv sync --frozen
      - run: uv run --offline python -m openbrec.verify adapter-replay --receipt evidence/m0/adapter-replay/m0-06-receipt.json
      - run: uv run --offline python -m openbrec.verify core-replay --receipt evidence/m0/core-replay/m0-06-receipt.json
      - run: uv run --offline python -m openbrec.verify determinism --runs 10 --receipt evidence/m0/determinism/m0-06-receipt.json
      - run: uv run --offline python -m openbrec.verify energy-replay --scenario fixtures/p0/energy/three-domains.json --receipt evidence/p0/p0-02/energy-replay/p0-02-receipt.json
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: m0-replay-receipts
          path: evidence/m0
          if-no-files-found: error
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: p0-energy-receipt
          path: evidence/p0/p0-02
          if-no-files-found: error

  privacy-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.1"
      - run: uv sync --frozen
      - run: uv run --offline python -m openbrec.verify review-quarantine --receipt evidence/m0/review-quarantine/m0-06-receipt.json
      - run: uv run --offline python -m openbrec.verify life-safety-preservation --receipt evidence/m0/life-safety-preservation/m0-06-receipt.json
      - run: uv run --offline python -m openbrec.verify privacy --receipt evidence/m0/privacy/m0-06-receipt.json
      - run: uv run --offline python -m openbrec.verify security --receipt evidence/m0/security/m0-06-receipt.json
      - run: uv run --offline python -m openbrec.verify key-lifecycle --receipt evidence/m0/key-lifecycle/m0-06-receipt.json
      - run: uv run --offline python -m openbrec.verify human-message-security --receipt evidence/p0/p0-03/human-message-security/p0-03-receipt.json
      - run: uv run --offline python -m openbrec.verify sos-state-replay --receipt evidence/p0/p0-03/sos-state-replay/p0-03-receipt.json
      - run: uv run --offline python -m openbrec.verify transport-policy --receipt evidence/p0/p0-03/transport-policy/p0-03-receipt.json
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: m0-privacy-security-receipts
          path: evidence/m0
          if-no-files-found: error
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: p0-secure-messaging-receipts
          path: evidence/p0/p0-03
          if-no-files-found: error

  transport-simulation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.1"
      - run: uv sync --frozen
      - run: uv run --offline python -m openbrec.verify transport-comparison --workload fixtures/p0/transports/common-workload.json --receipt evidence/p0/p0-04/transport-comparison/p0-04-receipt.json
      - run: uv run --offline python -m openbrec.verify malicious-transport --receipt evidence/p0/p0-04/malicious-transport/p0-04-receipt.json
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: p0-transport-simulation-receipts
          path: evidence/p0/p0-04
          if-no-files-found: error

  federation-simulation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.1"
      - run: uv sync --frozen
      - run: uv run --offline python -m openbrec.verify federation-scale --scenario fixtures/p0/federation/50k-sites.json --receipt evidence/p0/p0-05/federation-scale/p0-05-receipt.json
      - run: uv run --offline python -m openbrec.verify federation-reconciliation --receipt evidence/p0/p0-05/federation-reconciliation/p0-05-receipt.json
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: p0-federation-simulation-receipts
          path: evidence/p0/p0-05
          if-no-files-found: error

  simulation-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.1"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false
      - run: corepack enable && corepack install --global pnpm@11.9.0
      - run: uv sync --frozen
      - run: pnpm --dir apps/web install --frozen-lockfile
      - run: pnpm --dir apps/web exec playwright install --with-deps chromium
      - run: uv run --offline python -m openbrec.verify simulator --scenario fixtures/replay/core/m0-six-node.json --receipt evidence/m0/simulator/m0-06-receipt.json
      - run: uv run --offline python -m openbrec.verify terminal-ux --receipt evidence/p0/p0-06/terminal-ux/p0-06-receipt.json
      - run: uv run --offline python -m openbrec.verify ui-smoke --receipt evidence/p0/p0-06/ui-smoke/p0-06-receipt.json
      - run: uv run --offline python -m openbrec.verify accessibility --receipt evidence/p0/p0-06/accessibility/p0-06-receipt.json
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: m0-simulation-ui-receipts
          path: evidence/m0
          if-no-files-found: error
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: p0-offline-terminal-receipts
          path: evidence/p0/p0-06
          if-no-files-found: error

  beacon-simulation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.1"
      - run: uv sync --frozen
      - run: uv run --offline python -m openbrec.verify beacon-replay --receipt evidence/p0/p0-07/beacon-replay/p0-07-receipt.json
      - run: uv run --offline python -m openbrec.verify beacon-adversarial --receipt evidence/p0/p0-07/beacon-adversarial/p0-07-receipt.json
      - run: uv run --offline python -m openbrec.verify retention-fault --receipt evidence/p0/p0-07/retention-fault/p0-07-receipt.json
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: p0-beacon-simulation-receipts
          path: evidence/p0/p0-07
          if-no-files-found: error

  integrated-simulation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.1"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false
      - run: corepack enable && corepack install --global pnpm@11.9.0
      - run: uv sync --frozen
      - run: pnpm --dir apps/web install --frozen-lockfile
      - run: pnpm --dir apps/web exec playwright install --with-deps chromium
      - run: uv run --offline python -m openbrec.verify p0-integrated --scenario fixtures/p0/integrated/campaign.json --receipt evidence/p0/p0-08/p0-integrated/p0-08-receipt.json
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: p0-integrated-simulation-receipt
          path: evidence/p0/p0-08
          if-no-files-found: error

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.1"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false
      - run: corepack enable && corepack install --global pnpm@11.9.0
      - run: uv sync --frozen
      - run: pnpm install --frozen-lockfile
      - run: pnpm --dir apps/web install --frozen-lockfile
      - run: uv run --offline python -m openbrec.verify secret-scan --receipt evidence/m0/secret-scan/m0-06-receipt.json
      - run: uv run --offline python -m openbrec.verify sbom --output evidence/m0/sbom/openbrec-m0.cdx.json --receipt evidence/m0/sbom/m0-06-receipt.json
      - run: uv run --offline python -m openbrec.verify licenses --receipt evidence/m0/licenses/m0-06-receipt.json
      - run: uv run python -m openbrec.verify vulnerability-scan --receipt evidence/m0/vulnerability-scan/m0-06-receipt.json
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: m0-supply-chain-receipts
          path: evidence/m0
          if-no-files-found: error

  m0-exit:
    needs: [contracts, runtime, replay, privacy-security, simulation-ui, supply-chain]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.1"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false
      - run: corepack enable && corepack install --global pnpm@11.9.0
      - run: uv sync --frozen
      - run: pnpm install --frozen-lockfile
      - run: pnpm --dir apps/web install --frozen-lockfile
      - run: pnpm --dir apps/web exec playwright install --with-deps chromium
      - run: uv run python -m openbrec.verify all --evidence-dir "${{ runner.temp }}/evidence/m0"
      - run: git diff --exit-code
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: m0-exit-receipts
          path: ${{ runner.temp }}/evidence/m0
          if-no-files-found: error

  p0-exit:
    needs:
      - contracts
      - replay
      - privacy-security
      - transport-simulation
      - federation-simulation
      - simulation-ui
      - beacon-simulation
      - integrated-simulation
      - supply-chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.1"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false
      - run: corepack enable && corepack install --global pnpm@11.9.0
      - run: uv sync --frozen
      - run: pnpm install --frozen-lockfile
      - run: pnpm --dir apps/web install --frozen-lockfile
      - run: pnpm --dir apps/web exec playwright install --with-deps chromium
      - run: uv run python -m openbrec.verify p0-all --evidence-dir "${{ runner.temp }}/evidence/p0"
      - run: git diff --exit-code
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: p0-exit-receipts
          path: ${{ runner.temp }}/evidence/p0
          if-no-files-found: error

  p1a-readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.1"
      - run: uv sync --frozen
      - run: uv run --offline python -m openbrec.verify p1a-readiness --receipt evidence/p1a/readiness/readiness-receipt.json
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: p1a-readiness-receipt
          path: evidence/p1a/readiness
          if-no-files-found: error
