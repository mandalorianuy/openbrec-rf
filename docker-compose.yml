name: openbrec-lab-sim

x-runtime-environment: &runtime-environment
  OPENBREC_MQTT_HOST: mqtt
  OPENBREC_MQTT_PORT: "1883"
  OPENBREC_POSTGRES_HOST: postgres
  OPENBREC_POSTGRES_PORT: "5432"
  OPENBREC_POSTGRES_DB: openbrec
  OPENBREC_POSTGRES_USER: openbrec
  OPENBREC_POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
  OPENBREC_MASTER_KEY_FILE: /run/secrets/openbrec_master_key
  OPENBREC_MASTER_KEY_ID: lab-key-1
  OPENBREC_KEY_EPOCH: "1"

services:
  mqtt:
    image: eclipse-mosquitto:2@sha256:6f8d8a947c506f8a2290ec65cd4bd2bc7cb4d43fb5f6271f861cb013e2ef9797
    profiles: ["lab-sim"]
    command: ["mosquitto", "-c", "/mosquitto-no-auth/lab-sim.conf"]
    volumes:
      - ./config/mosquitto/lab-sim.conf:/mosquitto-no-auth/lab-sim.conf:ro
    networks: [lab-core]
    read_only: true
    tmpfs: [/tmp]
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "127.0.0.1", "-t", "openbrec/healthcheck", "-m", "ping", "-q", "1"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 3s

  postgres:
    image: postgres:17-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
    profiles: ["lab-sim"]
    environment:
      POSTGRES_DB: openbrec
      POSTGRES_USER: openbrec
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets: [postgres_password]
    volumes: [openbrec-db:/var/lib/postgresql/data]
    networks: [lab-core]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openbrec -d openbrec"]
      interval: 3s
      timeout: 3s
      retries: 15
      start_period: 5s

  api:
    image: openbrec/runtime:m0
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    profiles: ["lab-sim"]
    environment: *runtime-environment
    networks: [lab-core]
    read_only: true
    tmpfs: [/tmp]
    depends_on:
      mqtt: {condition: service_healthy}
      postgres: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/readyz', timeout=2).read()"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 3s

  fusion-worker:
    image: openbrec/runtime:m0
    profiles: ["lab-sim"]
    command: ["python", "-m", "openbrec_worker.worker"]
    environment: *runtime-environment
    secrets: [postgres_password, openbrec_master_key]
    networks: [lab-core]
    read_only: true
    tmpfs: [/tmp]
    depends_on:
      mqtt: {condition: service_healthy}
      postgres: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/openbrec-worker-ready"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 3s

  web:
    image: openbrec/web:m0
    build:
      context: ./apps/web
    profiles: ["lab-sim"]
    ports: ["127.0.0.1:${OPENBREC_WEB_PORT:-8080}:8080"]
    networks: [lab-core]
    read_only: true
    tmpfs: [/tmp, /var/cache/nginx, /var/run]
    depends_on:
      api: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 3s

  runtime-smoke:
    image: openbrec/runtime:m0
    profiles: ["m0-gate"]
    command: ["python", "-m", "openbrec_api.smoke"]
    environment:
      <<: *runtime-environment
      OPENBREC_POSTGRES_PASSWORD: ${OPENBREC_POSTGRES_PASSWORD:-}
      OPENBREC_MASTER_KEY_B64: ${OPENBREC_MASTER_KEY_B64:-}
      OPENBREC_ALLOW_EPHEMERAL_GATE_SECRETS: "1"
    networks: [lab-core]
    read_only: true
    tmpfs: [/tmp]
    depends_on:
      api: {condition: service_healthy}
      fusion-worker: {condition: service_healthy}
      web: {condition: service_healthy}

networks:
  lab-core:
    internal: true

volumes:
  openbrec-db:

secrets:
  postgres_password:
    file: ${OPENBREC_POSTGRES_PASSWORD_FILE_HOST}
  openbrec_master_key:
    file: ${OPENBREC_MASTER_KEY_FILE_HOST}
